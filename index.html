<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="A page to exhaust all the words you know">
    <title>Thousand-Word-Poem</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yyuyulm.github.io/thousand-word-poem/">
    <meta property="og:title" content="Thousand-Word-Poem">
    <meta property="og:description" content="Write without repeating a single word. A minimalist editorial workspace for poets.">
    <meta property="og:image" content="https://yyuyulm.github.io/thousand-word-poem/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://yyuyulm.github.io/thousand-word-poem/">
    <meta property="twitter:title" content="Thousand-Word-Poem">
    <meta property="twitter:description" content="Write without repeating a single word. A minimalist editorial workspace for poets.">
    <meta property="twitter:image" content="https://yyuyulm.github.io/thousand-word-poem/og-image.png">

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <h1>Thousand-Word-Poem</h1>
                <button id="themeToggle" class="icon-btn" aria-label="Toggle theme">☼</button>
            </div>
            <p>Make a poem where every word appears only once.</p>
        </header>

        <main class="main-layout">
            <!-- Panel Wrapper: side-by-side on mobile carousel, invisible on desktop -->
            <div id="panelWrapper" class="panel-wrapper">
                <!-- Left Sidebar: Vocabulary -->
                <aside id="leftSidebar" class="status-panel">
                    <div class="status-header">
                        <h3 id="uniqueHeading">Unique: 0</h3>
                        <div class="search-container">
                            <input type="text" id="vocabSearch" placeholder="Search..." spellcheck="false" autocomplete="off">
                        </div>
                    </div>
                    <div class="word-list">
                        <div id="filteredVocabList">
                            <span class="stat">No words yet!</span>
                        </div>
                    </div>
                </aside>

                <!-- Right Sidebar: Repeated words -->
                <aside id="rightSidebar" class="status-panel">
                    <div class="status-header">
                        <h3 id="countHeading">Word Count: 0</h3>
                    </div>
                    <div id="repeatedWordsList" class="repeated-list">
                        <span class="stat">No repeats yet!</span>
                </aside>
            </div>

            <!-- Editor -->
            <div class="editor-container">
                <div class="backdrop" id="backdrop"></div>
                <textarea id="poemInput" placeholder="Start typing without repeating..." spellcheck="false"></textarea>
            </div>

            <!-- Mobile-only icon toolbar: last in flex column, always at bottom -->
            <div class="mobile-toolbar">
                <button id="leftToggle" class="sidebar-toggle icon-btn" aria-label="Toggle unique words">◫</button>
                <button id="rightToggle" class="sidebar-toggle icon-btn" aria-label="Toggle word count">
                    <span>!</span>
                    <span id="repeatBadge" class="badge"></span>
                </button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
