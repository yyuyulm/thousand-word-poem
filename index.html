<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A tool that checks for repeating words in your poetry.">
    <title>Thousand Word Poem</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <h1>Thousand-Word-Poem</h1>
                <button id="themeToggle" class="icon-btn" aria-label="Toggle theme">☀️</button>
            </div>
            <p>Make a poem where every word appears only once.</p>
        </header>

        <main class="main-layout">
            <!-- Left Sidebar: Vocabulary -->
            <aside class="status-panel">
                <div class="status-header">
                    <h3 id="uniqueHeading">Unique: 0</h3>
                </div>
                <div id="uniqueWordsList" class="word-list">
                    <span class="stat">No words yet!</span>
                </div>
            </aside>

            <div class="editor-container" id="editorContainer">
                <div class="backdrop" id="backdrop"></div>
                <textarea id="poemInput" placeholder="Start typing without repeating..." spellcheck="false"></textarea>
            </div>

            <aside class="status-panel">
                <div class="status-header">
                    <h3 id="countHeading">Word Count: 0</h3>
                </div>
                <div id="repeatedWordsList" class="repeated-list">
                    <span class="stat">No repeats yet!</span>
                </div>
            </aside>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
